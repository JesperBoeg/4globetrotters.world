name: Deploy to Hostinger via SSH

on:
  push:
    branches: [ "main" ]
    paths:
      - "option-b-static/site/**"
      - ".github/workflows/deploy-hostinger.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          # Handle both real newlines and literal \n in secrets
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" | sed 's/\\n/\n/g' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Validate key was written with correct PEM structure
          head -1 ~/.ssh/id_rsa
          ssh-keyscan -p 65002 -H "${{ secrets.HOSTINGER_FTP_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "known_hosts populated: $(wc -l < ~/.ssh/known_hosts) entries"

      - name: Deploy via rsync over SSH
        run: |
          rsync -avz --delete \
            -e "ssh -p 65002 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            option-b-static/site/ \
            ${{ secrets.HOSTINGER_FTP_USER }}@${{ secrets.HOSTINGER_FTP_HOST }}:/home/${{ secrets.HOSTINGER_FTP_USER }}/public_html/site/

      - name: Verify deploy marker
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.${{ secrets.HOSTINGER_FTP_HOST }}/deploy-marker.txt)
          echo "deploy-marker.txt HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "DEPLOY CONFIRMED: live site is updated"
          else
            echo "WARNING: marker not found (status $STATUS) — CDN cache may still be propagating"
          fi
