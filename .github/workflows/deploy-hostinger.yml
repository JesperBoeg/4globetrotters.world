name: Publish Hostinger Deploy Branch

on:
  push:
    branches: [ "main" ]
    paths:
      - "option-b-static/site/**"
      - ".github/workflows/deploy-hostinger.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish option-b-static/site to hostinger-deploy branch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin hostinger-deploy > /dev/null; then
            git fetch origin hostinger-deploy:hostinger-deploy
            git worktree add /tmp/hostinger-deploy hostinger-deploy
          else
            git worktree add -b hostinger-deploy /tmp/hostinger-deploy
          fi

          rsync -a --delete --exclude '.git/' option-b-static/site/ /tmp/hostinger-deploy/

          cd /tmp/hostinger-deploy
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "Deploy ${GITHUB_SHA}"
            git push origin hostinger-deploy
            echo "Updated hostinger-deploy branch"
          else
            echo "No deploy changes"
          fi

      - name: Deployment routing note
        run: |
          echo "Hostinger Git should track branch: hostinger-deploy"
          echo "Hostinger deploy path should be: public_html/site"
