name: Deploy Static Site to Hostinger

on:
  push:
    branches: [ "main" ]
    paths:
      - "option-b-static/site/**"
      - ".github/workflows/deploy-hostinger.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Deploy via FTPS to Hostinger
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" << 'LFTP_EOF'
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ftp:passive-mode true
          set ssl:verify-certificate false
          set ssl:priority "NORMAL:-VERS-TLS1.3"
          set cmd:fail-exit true
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 15
          set xfer:clobber on

          pwd
          cls -la

          mirror -R \
            --verbose \
            --ignore-time \
            --parallel=2 \
            --exclude-glob .git* \
            --exclude-glob .github \
            --exclude-glob backup \
            --exclude-glob wp-content/uploads \
            option-b-static/site public_html/

          quit
          LFTP_EOF
