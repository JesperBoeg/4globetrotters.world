name: Publish Hostinger Deploy Branch

on:
  push:
    branches: [ "main" ]
    paths:
      - "option-b-static/site/**"
      - ".github/workflows/deploy-hostinger.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish option-b-static/site to hostinger-deploy branch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/hostinger-deploy
          git worktree add --detach /tmp/hostinger-deploy

          cd /tmp/hostinger-deploy
          git checkout --orphan hostinger-deploy
          git rm -rf . >/dev/null 2>&1 || true

          rsync -a --delete --exclude '.git' --exclude '.git/' "$GITHUB_WORKSPACE/option-b-static/site/" ./

          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push --force origin hostinger-deploy
          echo "Updated hostinger-deploy branch"

      - name: Deployment routing note
        run: |
          echo "Hostinger Git should track branch: hostinger-deploy"
          echo "Hostinger deploy path should be: public_html/site"
