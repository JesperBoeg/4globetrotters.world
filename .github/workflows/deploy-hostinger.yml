name: Deploy Static Site to Hostinger

on:
  push:
    branches: [ "main" ]
    paths:
      - "option-b-static/site/**"
      - ".github/workflows/deploy-hostinger.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTPS (/public_html/site)
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" << 'EOF'
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ftp:passive-mode true
          set ssl:verify-certificate false
          set net:timeout 60
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 30
          set xfer:clobber on

          mirror -R \
            --verbose \
            --ignore-time \
            --parallel=2 \
            --exclude-glob .git* \
            --exclude-glob .github \
            --exclude-glob backup \
            --exclude-glob wp-content/uploads \
            option-b-static/site /public_html/site/

          quit
          EOF
