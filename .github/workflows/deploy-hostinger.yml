name: Publish Hostinger Deploy Branch

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "option-b-static/site/**"
      - ".github/workflows/deploy-hostinger.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish option-b-static/site to hostinger-deploy branch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch existing hostinger-deploy branch if it exists
          git fetch origin hostinger-deploy || true

          rm -rf /tmp/hostinger-deploy
          git worktree add --detach /tmp/hostinger-deploy

          cd /tmp/hostinger-deploy

          # Build on existing history so Hostinger can git pull (no force-push)
          if git show-ref --verify --quiet refs/remotes/origin/hostinger-deploy; then
            git checkout -B hostinger-deploy origin/hostinger-deploy
          else
            git checkout --orphan hostinger-deploy
            git rm -rf . >/dev/null 2>&1 || true
          fi

          rsync -a --delete --exclude '.git' --exclude '.git/' "$GITHUB_WORKSPACE/option-b-static/site/" ./

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy ${GITHUB_SHA}"
            git push origin hostinger-deploy
            echo "Updated hostinger-deploy branch"
          fi
